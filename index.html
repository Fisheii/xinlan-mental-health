<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心澜智护 - 心理健康智慧陪伴平台</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=Montserrat:wght@300;400&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  
  <!-- 3D 动态水波纹画布 -->
  <canvas id="webgl-canvas"></canvas>
  
  <!-- 用于登录时的暗色遮罩 -->
  <div class="bg-overlay"></div>

  <!-- 首页标题区 -->
  <div class="hero-section">
    <div class="title-wrapper">
      <h1 class="hero-title">
        <span class="serif-text">心澜</span>
        <span class="sans-text">智护</span>
      </h1>
      <p class="hero-subtitle">Creating the unexpected healing</p>
    </div>
    <button class="enter-button">进入系统</button>
  </div>

  <!-- 高级毛玻璃登录容器 -->
  <div class="login-container" style="display: none;">
    <div class="glass-panel">
      <h2 class="login-title">欢迎登录</h2>
      
      <!-- 角色切换 Tabs -->
      <div class="role-tabs">
        <div class="tab active" data-role="student">学生端</div>
        <div class="tab" data-role="teacher">教师端</div>
        <div class="tab" data-role="parent">家长端</div>
        <!-- 滑块背景 -->
        <div class="tab-slider"></div>
      </div>

      <form class="login-form">
        <div class="input-group">
          <input type="text" placeholder="账号 / 学号" required>
        </div>
        <div class="input-group">
          <input type="password" placeholder="密码" required>
        </div>
        <div class="options">
          <label><input type="checkbox"> 记住密码</label>
          <a href="#" class="forgot-pwd">忘记密码？</a>
        </div>
        <button type="submit" class="submit-btn">登录</button>
      </form>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
